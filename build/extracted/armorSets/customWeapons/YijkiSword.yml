# Advanced Sets Weapons

# What set should be required in order to apply effects from this weapon?
# Set to '' to not require a set
requireSet: 'Yijki'

# Currently supported are only melee weapons
material: DIAMOND_SWORD

# Custom Model Data (for 1.13+ servers with custom item packs)
# Set custom model data integer
customModelData: 0

# Item Flags
# https://hub.spigotmc.org/javadocs/spigot/org/bukkit/inventory/ItemFlag.html
itemFlags: []
#  - 'HIDE_POTION_EFFECTS' # An Example Item Flag

# Weapon's name
name: '&f&lSword of Yijki'

# Weapon's lore
lore:
  - '&7A sword imbued with the destructive'
  - '&7power of Yijki, destroyer of worlds.'
  - ''
  - '&f&lYIJKI WEAPON BONUS'
  - '&f* Enemies deal 30% less damage to you.'
  - '&f* Wrath of Yijki Passive Ability'
  - '&7(Requires all four yijki items.)'

# These enchants will be applied by default when giving out weapons
# Advanced Enchantments are supported
enchants:
  - 'sharpness:35'
  - 'unbreaking:3'

# ** Enchantment effects are supported - view enchantments.yml to see all effects available for custom weapons
events:
  DEFENSE:
    chance: 100
    effects:
      - 'NEGATE_DAMAGE:30'
  ATTACK:
    chance: 20
    cooldown: 10
    effects:
      - 'MESSAGE:&f&l*** THE WRATH OF YIJKI <&b&l%attacker name%&f&l> @Aoe{radius=5,target=damageable}'
      - 'LIGHTNING @Aoe{radius=5,target=damageable}'
      - 'ADD_HARM:2 @Aoe{radius=5,target=damageable}'
