name: AdvancedEnchantments
version: 9.22.7
main: net.advancedplugins.ae.Core
api-version: "1.13"
folia-supported: true
description: "The most extensive custom enchantments plugin up to date"
website: "https://advancedplugins.net/item/AdvancedEnchantments.1"

authors:
  - 'AdvancedPlugins'

softdepend:
  - AAC
  - AAC5
  - AdvancedHeads
  - AuraSkills
  - AutoPickup
  - BanItem
  - BlockLocker
  - CMI
  - CoreProtect
  - DecentHolograms
  - Factions
  - FactionsOne
  - FactionsUUID
  - GadgetsMenu
  - GriefPrevention
  - ItemsAdder
  - mcMMO
  - MythicMobs
  - NoCheatPlus
  - PlaceholderAPI
  - PlotSquared
  - ProtocolLib
  - ProtectionStones
  - RestrictedCreative
  - Towny
  - LWC
  - Lands
  - RoseStacker
  - Slimefun
  - Spartan
  - Vault
  - Vulcan
  - ViaVersion
  - WildStacker
  - WorldGuard
  - WorldGuardExtraFlags
  - SuperiorSkyblock2
  - Oraxen
  - BeaconPlus3
  - LuckPerms
  - Residence
  - dynmap
  - Geyser-Spigot
  - Essentials
  - AdvancedChests

commands:
  AdvancedEnchantments:
    description: "Main AE Command"
    usage: "/AdvancedEnchantments"
    aliases: [ ae, customenchants ]

permissions:
  ae.bypass.souls:
    default: op
    description: "Allows players to bypass enchantment's soul requirements."
  ae.bypass.cooldown:
    default: op
    description: "Allows player to bypass enchantment's cooldowns."
  ae.help:
    default: op
    description: "Access to any /ae command"
  aegive.permission:
    default: op
    description: "Gives a player an item"
  advancedenchants.sets:
    default: op
    description: "Access armor sets and custom weapons"
  ae.admin:
    default: op
    description: "Open a menu with all possible enchantments"
  ae.enchant:
    default: op
    description: "Apply an enchant to the currently held item"
  ae.givercbook:
    default: op
    description: "Give a custom enchanted book"
  ae.givebook:
    default: op
    description: "Give book with specific rates"
  ae.givegkit:
    default: op
    description: "Give player gkit items"
  ae.giveitem:
    default: op
    description: "Give various plugin items"
  ae.giverandombook:
    default: op
    description: "Gives random book(s) from a group"
  ae.gkits:
    default: op
    description: "Resets a GKit for a player"
  ae.info:
    default: op
    description: "Information about custom enchantment"
  ae.lastchanged:
    default: op
    description: "Shows all enchants that were added/removed the last time /ae reload was run"
  ae.list:
    default: op
    description: "List all custom enchantments"
  ae.givedust:
    default: op
    description: "Give magic dust with a specific rate"
  ae.market:
    default: op
    description: "Opens menu to download community made enchants"
  ae.open:
    default: op
    description: "Force open a GUI for a player"
  ae.pasteenchants:
    default: op
    description: "Creates a pastebin with all enchants"
  ae.plinfo:
    default: op
    description: "Creates a bin with info about the plugin and server"
  ae.premade:
    default: op
    description: "View premade plugin configurations"
  ae.reload:
    default: op
    description: "Reload all configurations"
  ae.setsouls:
    default: op
    description: "Sets amount of souls on held item"
  ae.givetinkerer:
    default: op
    description: "Give tinkerers reward item to a player"
  ae.unenchant:
    default: op
    description: "Remove an enchant from the currently held item"
  ae.zip:
    default: op
    description: "Creates a zip file with all plugin folder contents"
